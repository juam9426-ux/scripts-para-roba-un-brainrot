<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts — @Umbrine Rock</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #1a0000;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, #5c0a0a 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, #3d0606 0%, transparent 50%),
    radial-gradient(ellipse 50% 50% at 20% 80%, #2a0404 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,80,80,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 15%, rgba(255,60,60,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 70%, rgba(200,30,30,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 60%, rgba(255,100,100,0.2) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 85%, rgba(180,20,20,0.3) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 3rem 1.5rem 4rem;
}

.header {
  text-align: center;
  margin-bottom: 3.5rem;
  position: relative;
}

.header::before {
  content: '';
  display: block;
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c0392b, transparent);
  margin: 0 auto 1.5rem;
}

.header::after {
  content: '';
  display: block;
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c0392b, transparent);
  margin: 1.5rem auto 0;
}

.title-scripts {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2.8rem, 7vw, 5rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.08em;
  text-shadow:
    0 0 30px rgba(192,57,43,0.8),
    0 0 60px rgba(192,57,43,0.4),
    2px 2px 0 #000,
    -1px -1px 0 #000;
  line-height: 1;
  margin-bottom: 0.6rem;
}

.title-at {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.85rem, 2.5vw, 1.1rem);
  font-weight: 400;
  color: #e8a0a0;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.85;
}

.ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 2rem 0;
}
.ornament-line {
  flex: 1;
  max-width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #8b1a1a, #c0392b, #8b1a1a, transparent);
}
.ornament-diamond {
  width: 10px;
  height: 10px;
  background: #c0392b;
  transform: rotate(45deg);
  box-shadow: 0 0 10px rgba(192,57,43,0.8);
}
.ornament-dot {
  width: 5px;
  height: 5px;
  background: #e74c3c;
  transform: rotate(45deg);
}

.scripts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.2rem;
  margin-bottom: 3rem;
}

.script-card {
  background: linear-gradient(135deg, #1f0000 0%, #2d0505 100%);
  border: 1px solid #5a0f0f;
  border-top: 2px solid #c0392b;
  border-radius: 4px;
  padding: 1.4rem 1.25rem;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  cursor: default;
  overflow: hidden;
}

.script-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,100,100,0.4), transparent);
}

.script-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #3d0a0a, transparent);
}

.script-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(192,57,43,0.3), 0 0 0 1px #8b1a1a;
  border-color: #e74c3c;
}

.script-number {
  position: absolute;
  top: 10px;
  right: 12px;
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  color: #5a1515;
  letter-spacing: 0.1em;
}

.script-name {
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  font-weight: 600;
  color: #f5c6c6;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 10px rgba(192,57,43,0.4);
  padding-right: 2rem;
}

.script-link {
  font-size: 0.72rem;
  color: #7a3030;
  word-break: break-all;
  margin-bottom: 1rem;
  font-family: 'Consolas', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.script-btn {
  width: 100%;
  padding: 0.55rem;
  background: linear-gradient(135deg, #7b0d0d, #a01c1c);
  color: #ffd5d5;
  border: 1px solid #c0392b;
  border-radius: 3px;
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
  text-transform: uppercase;
}

.script-btn:hover {
  background: linear-gradient(135deg, #a01c1c, #c0392b);
  box-shadow: 0 0 15px rgba(192,57,43,0.5);
}

.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: #5a2020;
  font-family: 'Cinzel', serif;
  font-size: 0.9rem;
  letter-spacing: 0.1em;
  display: none;
}

.footer {
  text-align: center;
  margin-top: 1rem;
}

.secret-trigger {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  color: #3d0f0f;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  transition: color 0.3s;
  display: inline-block;
  padding: 0.5rem 1rem;
}

.secret-trigger:hover {
  color: #7a2020;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal {
  background: linear-gradient(160deg, #1a0000, #2a0404);
  border: 1px solid #8b1a1a;
  border-top: 3px solid #c0392b;
  border-radius: 6px;
  width: 100%;
  max-width: 560px;
  padding: 2rem;
  position: relative;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.1rem;
  color: #f5c6c6;
  margin-bottom: 1.5rem;
  text-align: center;
  letter-spacing: 0.08em;
}

.modal-close {
  position: absolute;
  top: 12px; right: 16px;
  background: none;
  border: none;
  color: #7a3030;
  font-size: 1.2rem;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: #e74c3c; }

.pin-section { display: block; }
.admin-section { display: none; }

.modal input[type=text], .modal input[type=password], .modal input[type=number] {
  width: 100%;
  background: #0d0000;
  border: 1px solid #5a1515;
  border-radius: 4px;
  color: #f5c6c6;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  padding: 0.65rem 0.85rem;
  outline: none;
  margin-bottom: 0.75rem;
  letter-spacing: 0.05em;
  transition: border-color 0.2s;
}
.modal input:focus { border-color: #c0392b; }

.modal label {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: 0.7rem;
  color: #7a3030;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}

.modal-btn {
  width: 100%;
  padding: 0.7rem;
  background: linear-gradient(135deg, #7b0d0d, #c0392b);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity 0.2s;
  margin-top: 0.25rem;
}
.modal-btn:hover { opacity: 0.85; }
.modal-btn.danger { background: linear-gradient(135deg, #450a0a, #7b0d0d); margin-top: 0.5rem; }
.modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.pin-error { color: #e74c3c; font-size: 0.78rem; text-align: center; margin-top: 0.5rem; display: none; font-family: 'Cinzel', serif; }

.admin-list { margin: 1rem 0; display: flex; flex-direction: column; gap: 8px; }
.admin-item {
  background: #0d0000;
  border: 1px solid #3d0a0a;
  border-radius: 4px;
  padding: 0.7rem 0.85rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.admin-item-info { flex: 1; min-width: 0; }
.admin-item-name { font-family: 'Cinzel', serif; font-size: 0.82rem; color: #f5c6c6; }
.admin-item-link { font-size: 0.7rem; color: #5a1515; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.admin-item-order { font-family: 'Cinzel', serif; font-size: 0.7rem; color: #7a3030; width: 28px; text-align: center; }
.admin-item-btns { display: flex; gap: 4px; }
.admin-item-btns button {
  padding: 3px 8px;
  border: 1px solid #5a1515;
  background: #1a0000;
  color: #e8a0a0;
  border-radius: 3px;
  font-size: 0.7rem;
  cursor: pointer;
}
.admin-item-btns button:hover { background: #3d0a0a; }

.divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, #5a1515, transparent);
  margin: 1.2rem 0;
}

.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1f0000;
  border: 1px solid #c0392b;
  color: #f5c6c6;
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  padding: 0.65rem 1.5rem;
  border-radius: 4px;
  letter-spacing: 0.08em;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 200;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.generated-box {
  background: #0d0000;
  border: 1px solid #5a1515;
  border-radius: 4px;
  padding: 0.85rem;
  font-family: 'Consolas', monospace;
  font-size: 0.78rem;
  color: #e8a0a0;
  white-space: pre-wrap;
  word-break: break-all;
  margin-top: 0.75rem;
  max-height: 160px;
  overflow-y: auto;
  display: none;
}

.loading-state {
  text-align: center;
  padding: 3rem 1rem;
  color: #7a3030;
  font-family: 'Cinzel', serif;
  font-size: 0.85rem;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

<div class="container">

  <header class="header">
    <div class="title-scripts">Scripts</div>
    <div class="title-at">para Stela Brainrot</div>
  </header>

  <div class="ornament">
    <div class="ornament-dot"></div>
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line"></div>
    <div class="ornament-dot"></div>
  </div>

  <div class="scripts-grid" id="scriptsGrid"></div>
  <div class="empty-state" id="emptyState">— No hay scripts disponibles —</div>

  <footer class="footer">
    <span class="secret-trigger" id="secretTrigger" title="">scripts</span>
  </footer>

</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="cerrarModal()">✕</button>

    <div class="pin-section" id="pinSection">
      <div class="modal-title">Acceso Administrador</div>
      <label>Código de acceso</label>
      <input type="password" id="pinInput" placeholder="••••••" maxlength="6" onkeydown="if(event.key==='Enter')verificarPin()">
      <button class="modal-btn" onclick="verificarPin()">Ingresar</button>
      <div class="pin-error" id="pinError">Código incorrecto</div>
    </div>

    <div class="admin-section" id="adminSection">
      <div class="modal-title">Panel de Scripts</div>

      <label>Nombre del script</label>
      <input type="text" id="aNombre" placeholder="Ej: Mi Script">
      <label>Link / RAW</label>
      <input type="text" id="aLink" placeholder="https://pastefy.app/XXXXX/raw">
      <label>Posición (orden)</label>
      <input type="number" id="aOrden" placeholder="1, 2, 3..." min="1" value="1">
      <button class="modal-btn" id="btnAgregar" onclick="agregarScript()">＋ Agregar Script</button>

      <div class="divider-line"></div>

      <div style="font-family:'Cinzel',serif;font-size:0.7rem;color:#7a3030;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.6rem;">Scripts guardados</div>
      <div class="admin-list" id="adminList"></div>

      <div class="divider-line"></div>
      <button class="modal-btn danger" onclick="if(confirm('¿Eliminar todos los scripts?'))limpiarTodo()">🗑 Limpiar todo</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="genOverlay">
  <div class="modal" style="max-width:480px;">
    <button class="modal-close" onclick="document.getElementById('genOverlay').classList.remove('open')">✕</button>
    <div class="modal-title" id="genTitle">Script Generado</div>
    <div class="generated-box" id="generatedBox"></div>
    <button class="modal-btn" style="margin-top:1rem;" onclick="copiarGenerado()">📋 Copiar</button>
  </div>
</div>

<script>
const PIN = '282010';

// =====================================================================
// 👇 AQUÍ AGREGAS TUS SCRIPTS — edita esta lista directamente 👇
// Copia el formato de las líneas y agrega las tuyas.
// nombre = el nombre que se va a mostrar
// link   = el link RAW de tu script
// =====================================================================
let scripts = [
  { nombre: "Envy Hub", link: "loadstring(game:HttpGet('https://pastefy.app/F3FfXXr3/raw'))()" },
  { nombre: "PVP Hub", link: "loadstring(game:HttpGet('https://pastefy.app/O3T1VDy4/raw'))()" },
  { nombre: "Flast TP", link: "loadstring(game:HttpGet('https://orrxl4-protector.com/api/raw?id=0tnr8m9r'))()" },
  { nombre: "Trade Visual", link: "loadstring(game:HttpGet('https://pastefy.app/wGI1VZLm/raw'))()" },
];
// =====================================================================
// 👆 NO TOQUES NADA DEBAJO DE ESTA LÍNEA 👆
// =====================================================================

let clickCount = 0;
let clickTimer = null;

// ---------- TRIGGER SECRETO ----------
document.getElementById('secretTrigger').addEventListener('click', function() {
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 1500);
  if (clickCount >= 4) {
    clickCount = 0;
    abrirModal();
  }
});

function abrirModal() {
  document.getElementById('pinInput').value = '';
  document.getElementById('pinError').style.display = 'none';
  document.getElementById('pinSection').style.display = 'block';
  document.getElementById('adminSection').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('pinInput').focus(), 100);
}

function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('pinSection').style.display = 'block';
  document.getElementById('adminSection').style.display = 'none';
}

function verificarPin() {
  const val = document.getElementById('pinInput').value.trim();
  if (val === PIN) {
    document.getElementById('pinSection').style.display = 'none';
    document.getElementById('adminSection').style.display = 'block';
    renderAdminList();
  } else {
    document.getElementById('pinError').style.display = 'block';
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

async function agregarScript() {
  const nombre = document.getElementById('aNombre').value.trim();
  const link = document.getElementById('aLink').value.trim();
  const orden = parseInt(document.getElementById('aOrden').value) || scripts.length + 1;
  if (!nombre || !link) { showToast('Pon nombre y link'); return; }

  scripts.push({ nombre, link, orden });
  scripts.sort((a, b) => a.orden - b.orden);

  document.getElementById('aNombre').value = '';
  document.getElementById('aLink').value = '';
  document.getElementById('aOrden').value = scripts.length + 1;
  renderAdminList();
  renderScripts();
  showToast('Agregado (solo en esta visita — para que quede fijo, cópialo en el código)');
}

function eliminarScript(i) {
  scripts.splice(i, 1);
  renderAdminList();
  renderScripts();
}

function moverScript(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= scripts.length) return;
  [scripts[i], scripts[j]] = [scripts[j], scripts[i]];
  scripts.forEach((s, idx) => s.orden = idx + 1);
  renderAdminList();
  renderScripts();
}

function limpiarTodo() {
  scripts = [];
  renderAdminList();
  renderScripts();
  showToast('Scripts eliminados (solo en esta visita)');
}

function renderScripts() {
  const grid = document.getElementById('scriptsGrid');
  const empty = document.getElementById('emptyState');
  grid.innerHTML = '';
  if (scripts.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  scripts.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'script-card';
    card.innerHTML = `
      <div class="script-number">#${String(i+1).padStart(2,'0')}</div>
      <div class="script-name">${s.nombre}</div>
      <div class="script-link">${'•'.repeat(Math.min(s.link.length, 24))}</div>
      <button class="script-btn" onclick="generarScript(${i})">⚡ Generar Script</button>
    `;
    grid.appendChild(card);
  });
}

function renderAdminList() {
  const list = document.getElementById('adminList');
  list.innerHTML = '';
  if (scripts.length === 0) {
    list.innerHTML = '<div style="color:#3d0a0a;font-family:Cinzel,serif;font-size:0.75rem;text-align:center;padding:0.5rem;">Sin scripts</div>';
    return;
  }
  scripts.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'admin-item';
    div.innerHTML = `
      <div class="admin-item-order">${i+1}</div>
      <div class="admin-item-info">
        <div class="admin-item-name">${s.nombre}</div>
        <div class="admin-item-link">${s.link}</div>
      </div>
      <div class="admin-item-btns">
        <button onclick="moverScript(${i},-1)">▲</button>
        <button onclick="moverScript(${i},1)">▼</button>
        <button onclick="eliminarScript(${i})" style="color:#e74c3c;">✕</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function generarScript(i) {
  const s = scripts[i];
  document.getElementById('genTitle').textContent = s.nombre;
  document.getElementById('generatedBox').textContent = s.link;
  document.getElementById('generatedBox').style.display = 'block';
  document.getElementById('genOverlay').classList.add('open');
}

function copiarGenerado() {
  const txt = document.getElementById('generatedBox').textContent;
  navigator.clipboard.writeText(txt);
  showToast('Copiado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) cerrarModal();
});
document.getElementById('genOverlay').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// Inicializar: la lista ya viene escrita arriba en el código
renderScripts();
</script>
</body>
</html>
